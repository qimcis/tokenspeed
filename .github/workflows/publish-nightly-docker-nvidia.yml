name: Publish NVIDIA Nightly Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional Docker image tag. Defaults to nightly-<short SHA>.
        required: false
        type: string

concurrency:
  group: publish-nightly-docker-nvidia-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: lightseekorg/tokenspeed

jobs:
  build:
    if: github.repository == 'lightseekorg/tokenspeed'
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure these at repository or organization scope. The account must
      # have push access to the lightseekorg Docker Hub namespace.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.nvidia
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          no-cache: true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.artifact }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.repository == 'lightseekorg/tokenspeed'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      # Configure these at repository or organization scope. The account must
      # have push access to the lightseekorg Docker Hub namespace.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${INPUT_TAG:-nightly-${GITHUB_SHA::6}}"
          if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid image tag: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create multi-platform manifest
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          refs=()
          for digest in "${RUNNER_TEMP}"/digests/*; do
            refs+=("${IMAGE}@sha256:$(basename "${digest}")")
          done
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${refs[@]}"
