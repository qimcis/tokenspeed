name: Update tokenspeed-kernel-amd version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "tokenspeed-kernel-amd version to write to pyproject.toml, for example 0.1.3."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Require lightseek-bot token
        env:
          LIGHTSEEK_BOT_TOKEN: ${{ secrets.LIGHTSEEK_BOT_TOKEN }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          if [ "$SOURCE_REF" != "refs/heads/main" ]; then
            echo "Dispatch this workflow from main." >&2
            exit 1
          fi
          if [ -z "$LIGHTSEEK_BOT_TOKEN" ]; then
            echo "LIGHTSEEK_BOT_TOKEN is required to push the version update and create its pull request." >&2
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.LIGHTSEEK_BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare update branch
        id: prepare
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*((a|b|rc)[0-9]+)?(\.post[0-9]+)?$ ]]; then
            echo "Invalid public release version: $VERSION" >&2
            exit 1
          fi

          branch="bot/update-tokenspeed-kernel-amd-version-${VERSION}"
          git switch -c "$branch"
          git config user.name "lightseek-bot"
          git config user.email "243258330+lightseek-bot@users.noreply.github.com"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package version
        id: update
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("tokenspeed-kernel-amd/pyproject.toml")
          text = path.read_text()
          data = tomllib.loads(text)
          if data["project"]["name"] != "tokenspeed-kernel-amd":
              raise SystemExit(f"{path} does not describe tokenspeed-kernel-amd")

          project_match = re.search(r"(?ms)^\[project\]\n(?P<body>.*?)(?=^\[|\Z)", text)
          if project_match is None:
              raise SystemExit(f"missing [project] table in {path}")

          body = project_match.group("body")
          version_lines = re.findall(r'(?m)^version = "[^"]+"$', body)
          if len(version_lines) != 1:
              raise SystemExit(f"expected one project.version in {path}")
          updated_body = re.sub(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              body,
              count=1,
          )
          text = (
              text[: project_match.start("body")]
              + updated_body
              + text[project_match.end("body") :]
          )
          path.write_text(text)
          PY

          if git diff --quiet -- tokenspeed-kernel-amd/pyproject.toml; then
            echo "tokenspeed-kernel-amd is already at $VERSION."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit
        if: steps.update.outputs.changed == 'true'
        run: |
          python -m pip install pre-commit

          set +e
          pre-commit run --all-files
          precommit_status=$?
          set -e

          list_unexpected_files() {
            {
              git diff --name-only
              git ls-files --others --exclude-standard
            } | sort -u | while IFS= read -r path; do
              if [ "$path" != "tokenspeed-kernel-amd/pyproject.toml" ]; then
                echo "$path"
              fi
            done
          }

          unexpected_files=$(list_unexpected_files)
          if [ -n "$unexpected_files" ]; then
            echo "pre-commit changed files outside the AMD package version update:" >&2
            echo "$unexpected_files" >&2
            exit 1
          fi
          if [ "$precommit_status" -ne 0 ]; then
            pre-commit run --all-files
          fi

          unexpected_files=$(list_unexpected_files)
          if [ -n "$unexpected_files" ]; then
            echo "pre-commit changed files outside the AMD package version update:" >&2
            echo "$unexpected_files" >&2
            exit 1
          fi

      - name: Commit, push, and create pull request
        if: steps.update.outputs.changed == 'true'
        env:
          BRANCH: ${{ steps.prepare.outputs.branch }}
          GH_TOKEN: ${{ secrets.LIGHTSEEK_BOT_TOKEN }}
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          if git diff --quiet -- tokenspeed-kernel-amd/pyproject.toml; then
            echo "The package version is unchanged after pre-commit; nothing to publish."
            exit 0
          fi

          git add tokenspeed-kernel-amd/pyproject.toml
          git commit -s -m "build: update tokenspeed-kernel-amd to ${VERSION}"

          remote_line=$(git ls-remote --heads origin "refs/heads/${BRANCH}")
          remote_sha=${remote_line%%$'\t'*}
          if [ -n "$remote_sha" ]; then
            lease="refs/heads/${BRANCH}:${remote_sha}"
          else
            lease="refs/heads/${BRANCH}:"
          fi
          git push \
            --force-with-lease="$lease" \
            origin "HEAD:refs/heads/${BRANCH}"

          title="build: update tokenspeed-kernel-amd to ${VERSION}"
          body="Prepare the tokenspeed-kernel-amd ${VERSION} release from a reviewed main-branch change."
          pr_number=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body "$body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "$title" \
              --body "$body"
          fi
