name: Publish AMD Nightly Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional Docker image tag. Defaults to nightly-<short SHA>.
        required: false
        type: string

concurrency:
  group: publish-nightly-docker-amd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: lightseek/tokenspeed-amd

jobs:
  build-and-push:
    if: github.repository == 'lightseekorg/tokenspeed'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure these at repository or organization scope. The account must
      # have push access to both the lightseekorg and lightseek namespaces.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${INPUT_TAG:-nightly-${GITHUB_SHA::6}}"
          if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid image tag: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.amd
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          no-cache: true
          provenance: false
